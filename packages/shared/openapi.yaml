openapi: 3.0.3
info:
  title: Travel Miniprogram API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: API is healthy
  /api/v1/auth/wechat-login:
    post:
      summary: Local WeChat login exchange
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Local user identity
  /api/v1/regions:
    get:
      summary: List regions
      parameters:
        - in: query
          name: level
          schema:
            type: string
        - in: query
          name: parentId
          schema:
            type: string
      responses:
        "200":
          description: Region list
  /api/v1/regions/{id}/overview:
    get:
      summary: Get region overview
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Region with services, POIs, and guides
  /api/v1/regions/{id}/services:
    get:
      summary: List region services
      parameters:
        - $ref: "#/components/parameters/PathID"
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: Travel service list
  /api/v1/regions/{id}/pois:
    get:
      summary: List region POIs
      parameters:
        - $ref: "#/components/parameters/PathID"
        - in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: POI list
  /api/v1/regions/{id}/guides:
    get:
      summary: List region guides
      parameters:
        - $ref: "#/components/parameters/PathID"
      responses:
        "200":
          description: Guide list
  /api/v1/map/places/search:
    get:
      summary: Search places through signed Tencent Map WebService proxy
      parameters:
        - in: query
          name: keyword
          required: true
          schema:
            type: string
        - in: query
          name: boundary
          description: nearby searches around lat/lng; rectangle searches the visible map viewport.
          schema:
            type: string
            enum: [nearby, rectangle]
            default: nearby
        - in: query
          name: lat
          schema:
            type: number
            format: double
        - in: query
          name: lng
          schema:
            type: number
            format: double
        - in: query
          name: swLat
          schema:
            type: number
            format: double
        - in: query
          name: swLng
          schema:
            type: number
            format: double
        - in: query
          name: neLat
          schema:
            type: number
            format: double
        - in: query
          name: neLng
          schema:
            type: number
            format: double
        - in: query
          name: radiusMeters
          schema:
            type: integer
            minimum: 100
            maximum: 1000
            default: 1000
        - in: query
          name: categories
          description: Comma-separated Tencent POI category filter, up to 5 categories.
          schema:
            type: string
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
      responses:
        "200":
          description: Tencent place search result list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapPlace"
  /api/v1/map/places/suggest:
    get:
      summary: Suggest places for map search input through signed Tencent Map WebService proxy
      parameters:
        - in: query
          name: keyword
          required: true
          schema:
            type: string
        - in: query
          name: lat
          schema:
            type: number
            format: double
        - in: query
          name: lng
          schema:
            type: number
            format: double
        - in: query
          name: region
          schema:
            type: string
        - in: query
          name: regionFix
          schema:
            type: boolean
        - in: query
          name: categories
          description: Comma-separated Tencent POI category filter, up to 5 categories.
          schema:
            type: string
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Tencent place suggestion result list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapPlace"
  /api/v1/map/location/context:
    get:
      summary: Describe a location through Tencent reverse geocoder and nearby POIs
      parameters:
        - in: query
          name: lat
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: lng
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: radiusMeters
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 3000
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Reverse geocoder result with nearby POIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/MapLocationContext"
  /api/v1/map/routes/preview:
    get:
      summary: Preview travel route durations through signed Tencent Map direction proxy
      parameters:
        - in: query
          name: fromLat
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: fromLng
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: toLat
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: toLng
          required: true
          schema:
            type: number
            format: double
        - in: query
          name: modes
          description: Comma-separated route modes.
          schema:
            type: string
            default: walking,transit,driving
      responses:
        "200":
          description: Route preview list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MapRoutePlan"
  /api/v1/itineraries/generate:
    post:
      summary: Generate itinerary from destination, days, and preferences
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateItineraryRequest"
      responses:
        "200":
          description: Generated itinerary detail
  /api/v1/itineraries:
    get:
      summary: List current user's itineraries
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: Itinerary list
  /api/v1/itineraries/{id}:
    get:
      summary: Get itinerary detail
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Itinerary detail
    patch:
      summary: Update itinerary metadata
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/NumericID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchItineraryRequest"
      responses:
        "200":
          description: Updated itinerary detail
  /api/v1/itinerary-items/{id}:
    patch:
      summary: Update itinerary item state
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/NumericID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchItineraryItemRequest"
      responses:
        "200":
          description: Updated itinerary item
  /api/v1/favorites:
    get:
      summary: List favorites
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "200":
          description: Favorite list
    post:
      summary: Create favorite
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFavoriteRequest"
      responses:
        "200":
          description: Favorite
  /api/v1/favorites/{id}:
    delete:
      summary: Delete favorite
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Delete result
  /api/v1/itineraries/{id}/share:
    post:
      summary: Create read-only share snapshot
      parameters:
        - $ref: "#/components/parameters/UserID"
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Share snapshot
  /api/v1/shares/{shareCode}:
    get:
      summary: Get read-only share snapshot
      parameters:
        - in: path
          name: shareCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Share snapshot
  /api/v1/shares/{shareCode}/copy:
    post:
      summary: Copy share snapshot as independent itinerary
      parameters:
        - $ref: "#/components/parameters/UserID"
        - in: path
          name: shareCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Copied itinerary detail
  /api/v1/weather/summary:
    get:
      summary: Get static weather summary
      parameters:
        - in: query
          name: regionId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Weather summary
components:
  parameters:
    PathID:
      in: path
      name: id
      required: true
      schema:
        type: string
    NumericID:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: uint64
    UserID:
      in: header
      name: X-User-ID
      required: true
      schema:
        type: integer
        format: uint64
  schemas:
    LoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
    MapPlace:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        address:
          type: string
        category:
          type: string
        location:
          type: object
          properties:
            lat:
              type: number
              format: double
            lng:
              type: number
              format: double
        distance:
          type: number
          format: double
    MapLocationContext:
      type: object
      properties:
        location:
          type: object
          properties:
            lat:
              type: number
              format: double
            lng:
              type: number
              format: double
        address:
          type: string
        recommendAddress:
          type: string
        province:
          type: string
        city:
          type: string
        district:
          type: string
        street:
          type: string
        pois:
          type: array
          items:
            $ref: "#/components/schemas/MapPlace"
    MapRoutePlan:
      type: object
      properties:
        mode:
          type: string
          enum: [walking, transit, driving]
        distanceMeters:
          type: integer
        durationMinutes:
          type: integer
        direction:
          type: string
        taxiFareYuan:
          type: number
          format: double
    GenerateItineraryRequest:
      type: object
      required: [destinationRegionId, days]
      properties:
        destinationRegionId:
          type: string
        days:
          type: integer
          minimum: 1
          maximum: 14
        preferences:
          type: array
          items:
            type: string
    PatchItineraryRequest:
      type: object
      properties:
        title:
          type: string
        status:
          type: string
        budgetCents:
          type: integer
    PatchItineraryItemRequest:
      type: object
      properties:
        sortOrder:
          type: integer
        note:
          type: string
        done:
          type: boolean
    CreateFavoriteRequest:
      type: object
      required: [targetType, targetId]
      properties:
        targetType:
          type: string
        targetId:
          type: string
